services:
  web:
    build: .
    container_name: invest-web
    ports:
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: invest-server
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    build: ./docker/postgres
    container_name: invest-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./compose/postgres:/var/lib/postgresql/data
